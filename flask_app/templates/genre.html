<!DOCTYPE html>
<html>
<head>
  <title>{{ genre }} movies</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .movie { background: #f5f5f5; padding: 16px; margin: 10px 0; border-radius: 8px; }
    a { color: #378ADD; }
  </style>
</head>
<body>
  <a href="/">← Back</a>
  <h1>{{ genre }} movies</h1>
  <p>{{ movies|length }} found</p>
  {% for movie in movies %}
  <div class="movie">
    <a href="/movie/{{ movie.id }}">{{ movie.title }}</a>
    ★ {{ movie.rating }}/10
  </div>
  {% endfor %}
  {% if movies|length == 0 %}
  <p>No movies found for this genre.</p>
  {% endif %}
</body>
</html>
